<!DOCTYPE html>

<html data-wyt-title="st3jnP3W0ouFuNn3SqzWcIT/1onR94S/sdaO11mGzUSLm53H6PKE+e+J19KVzcGM8crXo7MWssTdnPHY" lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>．</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;
  --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);
  font-size:17px;line-height:1.8;
  -webkit-font-smoothing:antialiased;
}
img{user-drag:none;-webkit-user-drag:none;pointer-events:none;}

/* ============ SIDEBAR ============ */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding:6px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;
  text-decoration:none;color:var(--sbText);
  padding:3px 4px;width:100%;cursor:pointer;
  transition:all .25s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-item.active{background:linear-gradient(135deg,rgba(184,134,11,.3),rgba(212,168,75,.18));
  box-shadow:0 0 12px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:13px;
  font-family:"Noto Sans TC",sans-serif;
  box-shadow:0 2px 6px rgba(0,0,0,.3);margin-bottom:4px;}
.sb-item.active .sb-circle{box-shadow:0 0 14px rgba(184,134,11,.7);}
.sb-label{font-size:9.5px;letter-spacing:1px;text-align:center;line-height:1.3;
  font-family:"Noto Sans TC",sans-serif;opacity:.85;}
.sb-item.active .sb-label{opacity:1;color:var(--goldL);font-weight:500;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;
  width:42px;height:42px;border-radius:50%;background:var(--sbBg);
  color:var(--gold);border:1px solid var(--gold);font-size:20px;
  cursor:pointer;z-index:200;}

/* ============ READ PROGRESS ============ */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease, transform .45s ease;
}
.read-progress.hide-near-end{
  opacity:0;
  transform:translateX(-50%) translateY(28px);
}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* ============ MAIN ============ */
.main{margin-left:var(--sbW);min-height:100vh;padding:0;}

/* HERO */
.site-hero{
  position:relative;background:var(--headGrad);color:#f5e8c8;
  padding:80px 60px 70px;overflow:hidden;text-align:center;
  border-bottom:3px solid var(--gold);
}
.site-hero::before{
  content:"般若中觀";
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:280px;font-weight:900;color:rgba(212,168,75,.04);
  white-space:nowrap;pointer-events:none;letter-spacing:30px;
}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:8px;
  color:var(--goldL);margin-bottom:14px;opacity:.9;position:relative;z-index:1;}
.hero-title{font-size:48px;font-weight:700;color:#fff5dc;margin-bottom:18px;
  letter-spacing:6px;line-height:1.4;position:relative;z-index:1;
  text-shadow:0 2px 12px rgba(0,0,0,.5);}
.hero-subtitle{font-size:18px;color:var(--goldL);letter-spacing:4px;
  margin-bottom:22px;font-family:"Noto Sans TC",sans-serif;position:relative;z-index:1;}
.hero-sub{font-size:15px;color:#d4c4a8;letter-spacing:2.5px;line-height:1.9;
  position:relative;z-index:1;font-family:"Noto Sans TC",sans-serif;
  max-width:760px;margin:0 auto;opacity:.9;}
.hero-range{display:inline-block;margin-top:22px;padding:6px 22px;
  border:1px solid var(--gold);border-radius:20px;color:var(--goldL);
  font-size:13px;letter-spacing:3px;position:relative;z-index:1;
  font-family:"Noto Sans TC",sans-serif;}

/* ============ PREFACE ============ */
.preface{max-width:920px;margin:42px auto 24px;padding:32px 40px;
  background:linear-gradient(135deg,#fffdf7,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:14px;box-shadow:0 4px 20px rgba(91,58,41,.08);}
.preface-title{font-family:"Noto Sans TC",sans-serif;
  text-align:center;font-size:22px;color:var(--accent);
  letter-spacing:6px;margin-bottom:18px;font-weight:700;}
.preface p{font-size:16px;color:var(--text2);line-height:2.05;
  margin-bottom:14px;text-indent:2em;}
.preface p:last-child{margin-bottom:0;}

/* ============ TOC ============ */
.toc-section{max-width:1100px;margin:36px auto 56px;padding:0 32px;}
.toc-title{font-family:"Noto Sans TC",sans-serif;
  text-align:center;font-size:30px;letter-spacing:14px;color:var(--accent);
  margin-bottom:10px;font-weight:700;}
.toc-desc{text-align:center;color:var(--text-muted);font-size:14px;
  letter-spacing:3px;margin-bottom:32px;font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--gold);border-radius:10px;
  padding:18px 22px;transition:all .25s;text-decoration:none;
  color:var(--text);display:flex;align-items:flex-start;gap:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.12);
  border-left-color:var(--accent);}
.toc-num{flex-shrink:0;width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;font-family:"Noto Sans TC",sans-serif;
  box-shadow:0 2px 5px rgba(0,0,0,.15);}
.toc-name{font-size:16px;line-height:1.6;color:var(--text);font-weight:500;}
.toc-name small{display:block;color:var(--text-muted);font-size:13px;
  margin-top:4px;font-weight:400;letter-spacing:1px;}

/* ============ CHAPTER ============ */
.chapter{margin:0 auto 60px;max-width:980px;padding:0 32px;}
.ch-head{background:var(--headGrad);color:#fff5dc;
  padding:46px 40px 38px;border-radius:14px 14px 0 0;
  text-align:center;position:relative;overflow:hidden;}
.ch-head::after{content:"";position:absolute;left:50%;bottom:18px;
  width:64px;height:2px;background:var(--gold);transform:translateX(-50%);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:6px;color:var(--goldL);margin-bottom:14px;opacity:.92;}
.ch-name{font-size:30px;font-weight:700;letter-spacing:5px;line-height:1.4;
  color:#fff5dc;margin-bottom:14px;text-shadow:0 2px 10px rgba(0,0,0,.4);}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  color:#d4c4a8;letter-spacing:2.5px;opacity:.85;}
.ch-body{background:var(--card);padding:40px 50px 48px;
  border-radius:0 0 14px 14px;box-shadow:0 4px 20px rgba(91,58,41,.08);
  border:1px solid var(--border);border-top:none;}

/* BRIDGE */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 28px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin:32px 0 0;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px 0;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p:last-child{margin-bottom:0;}

/* HEADINGS */
.ch-body h2{font-size:24px;color:var(--accent);font-weight:700;
  margin:36px 0 16px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  letter-spacing:2px;}
.ch-body h2:first-child{margin-top:0;}
.ch-body h3{font-size:19px;color:var(--text);font-weight:700;
  margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border-light);
  letter-spacing:1.5px;}
.ch-body h4{font-size:16px;color:var(--text2);font-weight:600;
  margin:18px 0 10px;letter-spacing:1px;}
.ch-body h5{font-size:15px;color:var(--gold);font-weight:600;margin:14px 0 8px;}
.ch-body p{margin:0 0 12px;line-height:1.95;font-size:16px;color:var(--text);}
.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:600;}

/* VERSE / CLASSICAL */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;
  border-radius:10px;padding:18px 24px;margin:18px 0;line-height:2.05;
  font-size:16.5px;color:var(--text);position:relative;}
.text-label{display:inline-block;background:var(--primary);color:#fff;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;
  padding:3px 11px;border-radius:4px;letter-spacing:3px;
  margin-bottom:10px;font-weight:500;}
.verse{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;line-height:1.95;
  white-space:normal;text-align:center;font-style:normal;
  border-radius:0 8px 8px 0;color:var(--text2);font-size:16.5px;}

/* CARDS */
.card,.insight,.commentary,.note,.metaphor{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
.insight{border-left:4px solid var(--gold);
  background:linear-gradient(135deg,#fffdf7,#fbf5e6);}
.note{border-left:4px solid var(--accentL);
  background:linear-gradient(135deg,#fdf9ed,#f5ecd5);}
.metaphor{border-left:4px solid var(--accent);}
.card-title,.insight-title{font-size:17px;font-weight:700;color:var(--accent);
  margin-bottom:10px;letter-spacing:1.5px;font-family:"Noto Sans TC",sans-serif;}
.card-content,.insight-content{font-size:15.5px;line-height:1.95;color:var(--text2);}
.card-content p,.insight-content p{margin-bottom:8px;}

/* GRIDS */
.four-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:18px 0;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
.two-col{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:18px 0;}
.col-card,.cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.col-title,.cell-title{font-size:15px;font-weight:700;color:var(--accent);
  margin-bottom:8px;letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;}

/* COMPARE TABLE */
.compare-table{width:100%;border-collapse:collapse;margin:20px 0;
  background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.06);
  border-radius:8px;overflow:hidden;}
.compare-table th,.compare-table td{
  border:1px solid var(--border);padding:12px 16px;
  font-size:15px;line-height:1.7;text-align:center;vertical-align:middle;}
.compare-table th{background:var(--primary);color:#fff5dc;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:2px;font-weight:600;}
.compare-table tr:nth-child(odd) td{background:#fffaf0;}
.compare-table .row-label{background:var(--verseBg);font-weight:700;
  color:var(--accent);font-family:"Noto Sans TC",sans-serif;}

/* QA */
.qa{margin:18px 0;}
.qa .q{padding:12px 18px;background:#e8f0f8;border-left:4px solid #5b7a9a;
  margin-bottom:8px;border-radius:0 6px 6px 0;color:#2c4258;
  font-style:normal;}
.qa .q::before{content:"問曰：";font-weight:700;color:#3d5a7a;margin-right:6px;}
.qa .a{padding:12px 18px;background:#faf3e0;border-left:4px solid var(--accent);
  border-radius:0 6px 6px 0;color:var(--text);}
.qa .a::before{content:"答曰：";font-weight:700;color:var(--accent-red);margin-right:6px;}

/* FLOW / DOMINO */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:18px 0;padding:14px 18px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;}
.flow-box,.flow-step{padding:12px 18px;background:#fffaf0;
  border:1px solid var(--border);border-radius:6px;
  font-size:14.5px;color:var(--text);min-width:120px;text-align:center;
  font-family:"Noto Sans TC",sans-serif;line-height:1.6;}
.flow-arrow{color:var(--gold);font-size:22px;font-weight:700;}
.flow.flow-v{flex-direction:column;}

.domino-chain{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:6px;margin:18px 0;}
.domino{padding:10px 16px;background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;border-radius:6px;font-size:14px;font-family:"Noto Sans TC",sans-serif;
  letter-spacing:1px;box-shadow:0 2px 5px rgba(184,134,11,.3);}
.chain-arrow{color:var(--accent);font-size:18px;}

/* PILLAR */
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0;}
.pillar{background:linear-gradient(180deg,#fffaf0,#f5ecd8);
  border:1px solid var(--border);border-radius:10px;
  padding:18px 14px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.pillar-num{display:inline-block;width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:13px;font-weight:700;
  line-height:28px;font-family:"Noto Sans TC",sans-serif;margin-bottom:8px;}
.pillar-title{font-size:15.5px;font-weight:700;color:var(--accent);
  letter-spacing:1.5px;margin-bottom:6px;font-family:"Noto Sans TC",sans-serif;}
.pillar-sub{font-size:13.5px;color:var(--text-muted);line-height:1.65;}
.pillars-cap{text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:22px;color:var(--accent);font-weight:700;letter-spacing:6px;
  padding:14px 24px;background:linear-gradient(135deg,#fff8df,#f5e6b8);
  border:1px solid var(--gold);border-radius:8px;margin:0 0 16px;}

/* LENS / VENN-LIKE */
.lens-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
.lens-cell{background:linear-gradient(135deg,#fffaf0,#f5e6c8);
  border:1px solid var(--border);border-radius:10px;
  padding:18px 16px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.lens-cell.lens-a{border-color:#c9947a;background:linear-gradient(135deg,#fff5ee,#f5d8c8);}
.lens-cell.lens-b{border-color:#b8a04a;background:linear-gradient(135deg,#fffaee,#f0e2b0);}
.lens-cell.lens-c{border-color:#7a8aa0;background:linear-gradient(135deg,#eef3fa,#d8e0ee);}
.lens-name{font-size:24px;font-weight:700;font-family:"Noto Serif TC",serif;
  margin-bottom:8px;letter-spacing:5px;}
.lens-a .lens-name{color:#a25c3c;}
.lens-b .lens-name{color:#8a7224;}
.lens-c .lens-name{color:#3d5070;}
.lens-desc{font-size:14px;color:var(--text2);line-height:1.7;
  font-family:"Noto Sans TC",sans-serif;}
.lens-mid{text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:18px;color:var(--accent);font-weight:700;
  letter-spacing:6px;margin:8px 0;}

/* MATRIX TABLE for 體同用異 */
.matrix-table{width:100%;border-collapse:separate;border-spacing:0;margin:22px 0;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
  box-shadow:0 2px 10px rgba(91,58,41,.08);}
.matrix-table th,.matrix-table td{padding:14px 18px;font-size:15px;
  border-bottom:1px solid var(--border);text-align:center;line-height:1.7;}
.matrix-table th{background:var(--primary);color:#fff5dc;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:2px;font-weight:600;}
.matrix-table tr:last-child td{border-bottom:none;}
.matrix-table .dim{background:#fbf5e6;font-weight:700;color:var(--accent);
  font-family:"Noto Sans TC",sans-serif;text-align:center;letter-spacing:1px;}
.matrix-table .dim small{display:block;color:var(--text-muted);
  font-weight:400;font-size:11.5px;margin-top:3px;}

/* PHASE BADGE */
.phase-badge{display:inline-block;padding:5px 14px;background:var(--gold);
  color:#fff;border-radius:14px;font-size:12.5px;letter-spacing:2px;
  font-family:"Noto Sans TC",sans-serif;margin-right:8px;}

/* FOOTER */
.site-footer{background:var(--sbBg);color:var(--sbText);
  padding:38px 60px 32px;text-align:center;font-family:"Noto Sans TC",sans-serif;
  margin-top:40px;}
.site-footer p{font-size:13.5px;line-height:2;color:var(--sbText);
  letter-spacing:2px;margin-bottom:6px;opacity:.85;}
.site-footer .ft-title{color:var(--goldL);font-size:15px;letter-spacing:4px;
  font-weight:700;margin-bottom:14px;}
.site-footer .ft-divider{width:60px;height:2px;background:var(--gold);
  margin:14px auto;opacity:.6;}

#backTop{position:fixed;right:24px;bottom:60px;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  font-size:18px;display:none;z-index:90;
  box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{display:block;}

/* ============ 1.2x FONT BOOST ============ */
body{font-size:20px;}
.hero-title{font-size:56px;}
.hero-subtitle{font-size:20px;}
.hero-sub{font-size:18px;}
.hero-meta{font-size:17px;}
.hero-range{font-size:17px;}

      nf.addEventListener('load',function(){_rf(nf);});});
    // 自動高度輪詢（涵蓋重建後的 iframe；獨立於 master JS）
    var t=0,iv=setInterval(function(){t++;document.querySelectorAll('iframe.ch-frame').forEach(_rf);
      try{window.dispatchEvent(new Event('resize'));}catch(e){}
      if(t>60)clearInterval(iv);},300);
  }
  var R=window.__wyReady;
  if(R&&typeof R.then==='function'){R.then(run);}
  else{var w=0,wi=setInterval(function(){w++;if(window.__wyReady&&window.__wyReady.then){clearInterval(wi);window.__wyReady.then(run);}else if(w>200){clearInterval(wi);}},25);}
})();
